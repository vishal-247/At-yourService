<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopSphere Support Bot</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --container-bg: rgba(20, 24, 38, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-gradient: linear-gradient(135deg, #a78bfa, #6366f1);
            --bubble-user: linear-gradient(135deg, #8b5cf6, #6366f1);
            --bubble-bot: rgba(255, 255, 255, 0.06);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --glow-color: rgba(99, 102, 241, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Glowing Background Orbs */
        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.3;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: #8b5cf6;
            top: -100px;
            left: -100px;
            animation: float 20s infinite alternate ease-in-out;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: #6366f1;
            bottom: -150px;
            right: -100px;
            animation: float 25s infinite alternate-reverse ease-in-out;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        /* Glassmorphic Chat Wrapper */
        .chat-container {
            width: 90%;
            max-width: 950px;
            height: 85vh;
            background: var(--container-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Header Styles */
        .chat-header {
            padding: 20px 28px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(11, 15, 25, 0.4);
        }

        .bot-profile {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .bot-avatar-wrapper {
            position: relative;
        }

        .bot-avatar {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #fff;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background-color: #10b981;
            border: 2.5px solid #0f172a;
            border-radius: 50%;
            position: absolute;
            bottom: -2px;
            right: -2px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .bot-info h1 {
            font-size: 1.15rem;
            font-weight: 600;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2px;
        }

        .bot-info p {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stats-pill {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stats-pill i {
            color: #a78bfa;
        }

        /* Chat History Styles */
        .chat-messages {
            flex: 1;
            padding: 24px 28px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Message Bubbles */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            animation: fadeInUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(12px);
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
        }

        .message.bot {
            align-self: flex-start;
        }

        .message-content {
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
        }

        .message.user .message-content {
            background: var(--bubble-user);
            color: #fff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.2);
        }

        .message.bot .message-content {
            background: var(--bubble-bot);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 6px;
            align-self: flex-end;
        }

        .message.bot .message-time {
            align-self: flex-start;
        }

        /* Typing Indicator Animation */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 6px 10px;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            background-color: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Input Area Styles */
        .chat-input-area {
            padding: 20px 28px;
            border-top: 1px solid var(--border-color);
            background: rgba(11, 15, 25, 0.4);
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .chat-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px 20px;
            padding-right: 50px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .chat-input:focus {
            background: rgba(255, 255, 255, 0.07);
            border-color: #6366f1;
            box-shadow: 0 0 0 4px var(--glow-color);
        }

        .chat-input::placeholder {
            color: #4b5563;
        }

        .send-btn {
            background: var(--primary-gradient);
            border: none;
            outline: none;
            width: 52px;
            height: 52px;
            border-radius: 16px;
            color: #fff;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }

        .send-btn:active {
            transform: translateY(0);
        }

        /* Welcome Message Screen */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            margin: auto;
            max-width: 450px;
        }

        .welcome-icon {
            font-size: 3.5rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
            animation: pulse-icon 3s infinite ease-in-out;
        }

        @keyframes pulse-icon {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0px rgba(99, 102, 241, 0)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 15px rgba(99, 102, 241, 0.4)); }
        }

        .welcome-screen h2 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .welcome-screen p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            width: 100%;
        }

        .quick-action-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            padding: 14px 20px;
            border-radius: 14px;
            color: var(--text-main);
            text-align: left;
            font-size: 0.9rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .quick-action-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(99, 102, 241, 0.4);
            padding-left: 24px;
        }

        .quick-action-btn i {
            color: var(--text-muted);
            font-size: 0.8rem;
            transition: transform 0.25s ease;
        }

        .quick-action-btn:hover i {
            transform: translateX(4px);
            color: #a78bfa;
        }

        /* Branding Footer */
        .branding-footer {
            text-align: center;
            font-size: 0.75rem;
            color: #4b5563;
            padding: 10px 0;
            margin-top: -5px;
        }
    </style>
</head>
<body>

    <!-- Background Ambient Orbs -->
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>

    <!-- Main Container -->
    <div class="chat-container">
        <!-- Header -->
        <header class="chat-header">
            <div class="bot-profile">
                <div class="bot-avatar-wrapper">
                    <div class="bot-avatar" id="bot-avatar-img">
                        <i class="fa-solid fa-robot"></i>
                    </div>
                    <div class="status-dot"></div>
                </div>
                <div class="bot-info">
                    <h1 id="bot-title">At Your Service</h1>
                    <p id="bot-status"><i class="fa-solid fa-circle-check" style="color: #10b981;"></i> Online & Ready</p>
                </div>
            </div>
            
            <div class="stats-pill" id="stats-badge">
                <i class="fa-solid fa-database"></i>
                <span id="chunk-info">Loading Vector Store...</span>
            </div>
        </header>

        <!-- Message History -->
        <div class="chat-messages" id="chat-messages-container">
            <!-- Welcome Screen Shown if no messages -->
            <div class="welcome-screen" id="welcome-wrapper">
                <div class="welcome-icon">
                    <i class="fa-solid fa-comments"></i>
                </div>
                <h2>At Your Service</h2>
                <p>Welcome! I am the At Your Service AI assistant, powered by LangChain and Ollama. Ask me anything about our official customer regulations, terms of service, or delivery rules.</p>
                
                <div class="quick-actions">
                    <button class="quick-action-btn" onclick="sendQuickQuestion('How long does it take to process a refund?')">
                        <span>How long does it take to process a refund?</span>
                        <i class="fa-solid fa-chevron-right"></i>
                    </button>
                    <button class="quick-action-btn" onclick="sendQuickQuestion('What is the effective date of the Terms of Service?')">
                        <span>What is the effective date of the Terms of Service?</span>
                        <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Input Bar -->
        <div class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" class="chat-input" id="user-input" placeholder="Ask a question about the customer rules..." autocomplete="off">
            </div>
            <button class="send-btn" id="send-button">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- Script Section -->
    <script>
        const messagesContainer = document.getElementById('chat-messages-container');
        const welcomeWrapper = document.getElementById('welcome-wrapper');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');
        const chunkInfo = document.getElementById('chunk-info');

        // Fetch initialization status on page load
        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                if (data.document_loaded) {
                    chunkInfo.textContent = `rules.pdf Ingested (${data.chunk_count} Chunks)`;
                } else {
                    chunkInfo.textContent = 'Ingestion In Progress...';
                    chunkInfo.style.color = '#f59e0b';
                }
            } catch (err) {
                console.error("Failed to load status:", err);
                chunkInfo.textContent = 'Offline';
            }
        }

        // Initialize status load
        fetchStatus();

        // Helper to format timestamps
        function getFormattedTime() {
            const date = new Date();
            let hours = date.getHours();
            let minutes = date.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; // the hour '0' should be '12'
            minutes = minutes < 10 ? '0'+minutes : minutes;
            return `${hours}:${minutes} ${ampm}`;
        }

        // Append a message to the UI
        function appendMessage(sender, text) {
            // Hide welcome screen on first message
            if (welcomeWrapper) {
                welcomeWrapper.style.display = 'none';
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerText = text;

            const timeDiv = document.createElement('div');
            timeDiv.className = 'message-time';
            timeDiv.innerText = getFormattedTime();

            messageDiv.appendChild(contentDiv);
            messageDiv.appendChild(timeDiv);

            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Show typing indicator
        function showTypingIndicator() {
            const indicatorDiv = document.createElement('div');
            indicatorDiv.className = 'message bot';
            indicatorDiv.id = 'typing-indicator-wrapper';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.innerHTML = `
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            `;

            contentDiv.appendChild(indicator);
            indicatorDiv.appendChild(contentDiv);
            messagesContainer.appendChild(indicatorDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Remove typing indicator
        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator-wrapper');
            if (indicator) {
                indicator.remove();
            }
        }

        // Send message handler
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Show user message
            appendMessage('user', message);
            userInput.value = '';

            // Show typing indicator
            showTypingIndicator();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                removeTypingIndicator();

                if (response.ok) {
                    appendMessage('bot', data.response);
                } else {
                    appendMessage('bot', `Error: ${data.error || 'Failed to generate response'}`);
                }
            } catch (err) {
                console.error(err);
                removeTypingIndicator();
                appendMessage('bot', 'Failed to communicate with the server. Please verify Ollama is running.');
            }
        }

        // Quick action questions
        function sendQuickQuestion(questionText) {
            userInput.value = questionText;
            sendMessage();
        }

        // Event listeners
        sendButton.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
